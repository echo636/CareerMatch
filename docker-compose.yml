version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: careermatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: careermatch
      POSTGRES_USER: careermatch
      POSTGRES_PASSWORD: careermatch
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: careermatch-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: careermatch-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  qdrant-data:
  minio-data:
